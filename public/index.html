<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ChunavGuru - Your interactive AI-powered guide to understanding the Indian election process, timelines, and democratic system.">
  <meta name="keywords" content="Indian elections, election education, voting guide, ECI, democracy, ChunavGuru">
  <meta name="author" content="ChunavGuru Team">
  <meta name="theme-color" content="#0A0A14">
  <title>ChunavGuru — Indian Election Education Assistant</title>

  <!-- PWA & Mobile -->
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/img/logo.png">
  <link rel="apple-touch-icon" href="/img/logo.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">

  <!-- Data Scripts (Deferred) -->
  <script src="/js/data/quizData.js" defer></script>
  <script src="/js/data/flashcardData.js" defer></script>
  <script src="/js/data/timelineData.js" defer></script>
  <script src="/js/data/guideData.js" defer></script>

  <!-- Service Scripts (Deferred) -->
  <script src="/js/services/api.js" defer></script>
  <script src="/js/services/tts.js" defer></script>
  <script src="/js/services/translate.js" defer></script>

  <!-- Component Scripts (Deferred) -->
  <script src="/js/components/dashboard.js" defer></script>
  <script src="/js/components/guide.js" defer></script>
  <script src="/js/components/timeline.js" defer></script>
  <script src="/js/components/quiz.js" defer></script>
  <script src="/js/components/flashcards.js" defer></script>
  <script src="/js/components/chatbot.js" defer></script>

  <!-- Main App Controller (Deferred) -->
  <script src="/js/app.js" defer></script>
</head>
<body>
  <!-- Skip Navigation for Accessibility -->
  <a href="#main-content" class="skip-link" id="skip-nav">Skip to main content</a>

  <!-- App Shell -->
  <div class="app" id="app">
    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
      <div class="sidebar__logo" id="sidebar-logo">
        <span class="sidebar__logo-icon">🗳️</span>
        <span class="sidebar__logo-text">ChunavGuru</span>
      </div>

      <ul class="sidebar__nav" id="sidebar-nav" role="menubar">
        <li role="none"><a href="#/dashboard" class="sidebar__link active" role="menuitem" data-page="dashboard" id="nav-dashboard">
          <span class="sidebar__link-icon">🏠</span><span class="sidebar__link-text">Dashboard</span>
        </a></li>
        <li role="none"><a href="#/guide" class="sidebar__link" role="menuitem" data-page="guide" id="nav-guide">
          <span class="sidebar__link-icon">📖</span><span class="sidebar__link-text">Election Guide</span>
        </a></li>
        <li role="none"><a href="#/timeline" class="sidebar__link" role="menuitem" data-page="timeline" id="nav-timeline">
          <span class="sidebar__link-icon">📅</span><span class="sidebar__link-text">Timeline</span>
        </a></li>
        <li role="none"><a href="#/quiz" class="sidebar__link" role="menuitem" data-page="quiz" id="nav-quiz">
          <span class="sidebar__link-icon">🧠</span><span class="sidebar__link-text">Quiz</span>
        </a></li>
        <li role="none"><a href="#/flashcards" class="sidebar__link" role="menuitem" data-page="flashcards" id="nav-flashcards">
          <span class="sidebar__link-icon">🃏</span><span class="sidebar__link-text">Flashcards</span>
        </a></li>
        <li role="none"><a href="#/chat" class="sidebar__link" role="menuitem" data-page="chat" id="nav-chat">
          <span class="sidebar__link-icon">🤖</span><span class="sidebar__link-text">AI Assistant</span>
        </a></li>
      </ul>

      <div class="sidebar__footer">
        <span class="sidebar__footer-text">Powered by Google AI</span>
      </div>
    </nav>

    <!-- Main Content Area -->
    <div class="main-wrapper">
      <!-- Top Header -->
      <header class="header" id="header" role="banner">
        <button class="header__menu-btn" id="menu-toggle" aria-label="Toggle navigation menu">
          <span></span><span></span><span></span>
        </button>
        <h1 class="header__title" id="header-title">Dashboard</h1>
        <div class="header__actions">
          <!-- Language Switcher -->
          <div class="header__lang" id="lang-switcher">
            <label for="lang-select" class="sr-only">Select Language</label>
            <select id="lang-select" class="header__lang-select" aria-label="Select language">
              <option value="en">🇬🇧 English</option>
              <option value="hi">🇮🇳 हिन्दी</option>
              <option value="te">తెలుగు</option>
              <option value="ta">தமிழ்</option>
              <option value="bn">বাংলা</option>
              <option value="mr">मराठी</option>
              <option value="kn">ಕನ್ನಡ</option>
              <option value="gu">ગુજરાતી</option>
              <option value="ml">മലയാളം</option>
              <option value="pa">ਪੰਜਾਬੀ</option>
            </select>
          </div>
          <!-- Theme Toggle -->
          <button class="header__theme-btn" id="theme-toggle" aria-label="Toggle dark/light theme">
            <span class="header__theme-icon" id="theme-icon">🌙</span>
          </button>
        </div>
      </header>

      <!-- Page Content -->
      <main class="content" id="main-content" role="main">
        <!-- Pages are dynamically rendered here -->
        <div id="page-container" class="page-container" aria-live="polite" aria-atomic="false"></div>
      </main>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav" id="mobile-nav" role="navigation" aria-label="Mobile navigation">
      <a href="#/dashboard" class="mobile-nav__link active" data-page="dashboard" id="mob-nav-dashboard" aria-label="Dashboard">🏠</a>
      <a href="#/guide" class="mobile-nav__link" data-page="guide" id="mob-nav-guide" aria-label="Guide">📖</a>
      <a href="#/timeline" class="mobile-nav__link" data-page="timeline" id="mob-nav-timeline" aria-label="Timeline">📅</a>
      <a href="#/quiz" class="mobile-nav__link" data-page="quiz" id="mob-nav-quiz" aria-label="Quiz">🧠</a>
      <a href="#/flashcards" class="mobile-nav__link" data-page="flashcards" id="mob-nav-flashcards" aria-label="Flashcards">🃏</a>
      <a href="#/chat" class="mobile-nav__link" data-page="chat" id="mob-nav-chat" aria-label="AI Chat">🤖</a>
    </nav>

    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
  </div>

</html>
